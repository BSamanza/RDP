name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    env:
      RDP_USERNAME: RDP
      RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}

    steps:
      - name: Validate required secrets
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RDP_PASSWORD)) {
            Write-Error "Missing required GitHub secret: RDP_PASSWORD"
            exit 1
          }

      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null

          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force

      - name: Create RDP User (fixed password)
        run: |
          function Get-ValidRdpPassword([string]$password) {
            if ([string]::IsNullOrWhiteSpace($password)) {
              throw "RDP_PASSWORD is empty."
            }

            $effective = $password

            if ($effective -cnotmatch '[A-Z]') { $effective += 'A' }
            if ($effective -notmatch '[a-z]') { $effective += 'a' }
            if ($effective -notmatch '\d') { $effective += '9' }
            if ($effective -notmatch '[^a-zA-Z0-9]') { $effective += '!' }
            if ($effective.Length -lt 8) { $effective += ('x' * (8 - $effective.Length)) }

            return $effective
          }

          $effectivePassword = Get-ValidRdpPassword $env:RDP_PASSWORD
          $securePass = ConvertTo-SecureString $effectivePassword -AsPlainText -Force

          if (Get-LocalUser -Name $env:RDP_USERNAME -ErrorAction SilentlyContinue) {
            Remove-LocalUser -Name $env:RDP_USERNAME -ErrorAction SilentlyContinue
          }

          New-LocalUser -Name $env:RDP_USERNAME -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $env:RDP_USERNAME
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $env:RDP_USERNAME

          if (-not (Get-LocalUser -Name $env:RDP_USERNAME)) {
              Write-Error "User creation failed"
              exit 1
          }

          "RDP_EFFECTIVE_PASSWORD=$effectivePassword" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"

          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=gh-runner-$env:GITHUB_RUN_ID

          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }

          if (-not $tsIP) {
              Write-Error "Tailscale IP not assigned. Exiting."
              exit 1
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Verify RDP Accessibility
        run: |
          Write-Host "Tailscale IP: $env:TAILSCALE_IP"

          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $testResult.TcpTestSucceeded) {
              Write-Error "TCP connection to RDP port 3389 failed"
              exit 1
          }
          Write-Host "TCP connectivity successful!"

      - name: Download startup files to Desktop
        run: |
          $ErrorActionPreference = "Stop"

          function Get-GoogleDriveFileId([string]$url) {
            if ($url -match '/file/d/([^/]+)/') {
              return $matches[1]
            }

            if ($url -match '[?&]id=([^&]+)') {
              return $matches[1]
            }

            throw "Could not extract Google Drive file id from: $url"
          }

          function Get-DownloadFileName($response, [string]$defaultName) {
            $contentDisposition = $response.Headers["Content-Disposition"]
            if ($contentDisposition -and $contentDisposition -match 'filename\*=UTF-8''''(?<name>[^;]+)') {
              return [System.Uri]::UnescapeDataString($matches["name"])
            }

            if ($contentDisposition -and $contentDisposition -match 'filename="?([^\";]+)"?') {
              return $matches[1]
            }

            return $defaultName
          }

          function Convert-GoogleDriveValue([string]$value) {
            $decoded = $value `
              -replace '\\u003d', '=' `
              -replace '\\u0026', '&' `
              -replace '\\u002f', '/' `
              -replace '\\/', '/'

            $decoded = [System.Net.WebUtility]::HtmlDecode($decoded)

            if ($decoded.StartsWith("//")) {
              return "https:$decoded"
            }

            if ($decoded.StartsWith("/")) {
              return "https://drive.google.com$decoded"
            }

            return $decoded
          }

          function Get-GoogleDriveDownloadUrl([string]$html, [string]$fileId) {
            $patterns = @(
              '"downloadUrl":"(?<url>[^"]+)"',
              'href="(?<url>/uc\?export=download[^"]+)"',
              'href="(?<url>/open\?id=[^"]+)"'
            )

            foreach ($pattern in $patterns) {
              $match = [regex]::Match($html, $pattern)
              if ($match.Success) {
                return Convert-GoogleDriveValue $match.Groups["url"].Value
              }
            }

            $confirmMatch = [regex]::Match($html, 'confirm=([0-9A-Za-z_-]+)')
            if ($confirmMatch.Success) {
              return "https://drive.google.com/uc?export=download&confirm=$($confirmMatch.Groups[1].Value)&id=$fileId"
            }

            return $null
          }

          function Download-GoogleDriveFile([string]$shareUrl, [string]$workingPath) {
            $fileId = Get-GoogleDriveFileId $shareUrl
            $session = New-Object Microsoft.PowerShell.Commands.WebRequestSession
            $tempFile = Join-Path $workingPath "$fileId.download"
            $candidates = [System.Collections.Generic.List[string]]::new()
            $candidates.Add($shareUrl)
            $candidates.Add("https://drive.usercontent.google.com/download?id=$fileId&export=download&confirm=t")
            $candidates.Add("https://drive.google.com/uc?export=download&confirm=t&id=$fileId")
            $candidates.Add("https://drive.google.com/uc?export=download&id=$fileId")

            $attempted = [System.Collections.Generic.HashSet[string]]::new([System.StringComparer]::OrdinalIgnoreCase)
            $lastError = $null
            $downloadResponse = $null

            while ($candidates.Count -gt 0) {
              $candidate = $candidates[0]
              $candidates.RemoveAt(0)

              if ([string]::IsNullOrWhiteSpace($candidate) -or -not $attempted.Add($candidate)) {
                continue
              }

              try {
                $response = Invoke-WebRequest -Uri $candidate -WebSession $session -MaximumRedirection 5
                $contentDisposition = [string]$response.Headers["Content-Disposition"]
                $contentType = [string]$response.Headers["Content-Type"]

                if ($contentDisposition) {
                  [System.IO.File]::WriteAllText($tempFile, $response.Content)
                  $downloadResponse = Invoke-WebRequest -Uri $candidate -WebSession $session -OutFile $tempFile -PassThru -MaximumRedirection 5
                  break
                }

                $nextUrl = Get-GoogleDriveDownloadUrl $response.Content $fileId
                if ($nextUrl) {
                  $candidates.Add($nextUrl)
                  continue
                }

                if ($contentType -and $contentType -notmatch 'text/html') {
                  $downloadResponse = Invoke-WebRequest -Uri $candidate -WebSession $session -OutFile $tempFile -PassThru -MaximumRedirection 5
                  break
                }

                $lastError = "Received HTML instead of a downloadable file from $candidate"
              }
              catch {
                $lastError = $_.Exception.Message
              }
            }

            if (-not $downloadResponse) {
              throw "Unable to download Google Drive file $fileId. $lastError"
            }

            $fileName = Get-DownloadFileName $downloadResponse "$fileId.bin"
            return [pscustomobject]@{
              FileName = $fileName
              TempPath = $tempFile
            }
          }

          $desktopPaths = @(
            "C:\Users\$env:RDP_USERNAME\Desktop",
            "C:\Users\Public\Desktop"
          ) | Select-Object -Unique

          foreach ($desktopPath in $desktopPaths) {
            New-Item -ItemType Directory -Path $desktopPath -Force | Out-Null
          }

          $workingPath = Join-Path $env:TEMP "rdp-startup-files"
          New-Item -ItemType Directory -Path $workingPath -Force | Out-Null

          $urls = @(
            "https://drive.google.com/file/d/13YCSrDW13FcRDnezQktyKJEll8hFDtaC/view?usp=drive_link",
            "https://drive.google.com/file/d/10sXxJr36wis7ZXg5VZ23BcJBnNnk-QQg/view?usp=drive_link"
          )

          foreach ($url in $urls) {
            try {
              $download = Download-GoogleDriveFile $url $workingPath
              $savedFiles = @()
              foreach ($desktopPath in $desktopPaths) {
                $destination = Join-Path $desktopPath $download.FileName
                Copy-Item -Path $download.TempPath -Destination $destination -Force
                $savedFiles += $destination
              }

              foreach ($savedFile in $savedFiles) {
                Write-Host "Saved startup file: $savedFile"
              }

              Remove-Item -Path $download.TempPath -Force -ErrorAction SilentlyContinue
            }
            catch {
              Write-Warning "Skipping startup file because download failed for $url - $($_.Exception.Message)"
            }
          }

          Remove-Item -Path $workingPath -Recurse -Force -ErrorAction SilentlyContinue

      - name: Maintain Connection
        run: |
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "Address: $env:TAILSCALE_IP"
          Write-Host "Username: $env:RDP_USERNAME"
          Write-Host "Password: $env:RDP_EFFECTIVE_PASSWORD"
          Write-Host "==================`n"

          while ($true) {
              Write-Host "[$(Get-Date)] RDP Active - Use Ctrl+C in workflow to terminate"
              Start-Sleep -Seconds 300
          }
